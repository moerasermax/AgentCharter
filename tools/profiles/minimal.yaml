# AgentCharter Profile Preset — minimal
#
# 適用：探索型專案、單人 + 1 AI、短期實驗。
# 設計：只啟用最核心防線，配置從寬，搬遷成本最低。
#
# 條款啟用：9 / 19（maintainer-discipline 採用方無關 / ai-vendor-onboarding 預設關，minimal 場景單 AI 單角色不需要）
# 預設參數：寬鬆

version: "0.4.0"
charter_version: "0.7.4"
preset: minimal

# === B1 粒度：條款啟用 ===
enabled:
  role-separation: true                # 必需 — 角色互鎖
  audit-rights: true                   # 必需 — 抽驗權
  failure-modes: true                  # 必需 — F1〜F5 偵測
  structural-anti-fabrication: true    # v0.2 全模式強制，無法停用
  evidence-first: true                 # 必需 — 實證先行
  domain-axiom-slot: true              # 必需 — 領域公理槽位規範（即使 minimal 也須有合規領域公理檔）
  versioning-migration: true           # 必需 — 升級時的遷移流程；任何專案都會遇到 charter 升版
  working-stack-discipline: true       # 必需 — DRAFT 暫存堆疊 + session 重啟接班；對單 AI 場景也有價值（context 重啟）

  # 以下可關（簡單專案不需要）
  violation-reflection: false          # 違規反省紀錄 — minimal 不要求
  escalation-protocol: false           # 升級協議 — 簡單專案直接退稿即可
  output-mode-protocol: false          # eco/verbose 切換 — 不需要
  completion-delivery: true            # 完工交付契約 — 仍建議啟用
  handoff-chain: true                  # HANDOFF 鏈 — 仍建議啟用
  cross-ai-handoff: false              # 跨 AI 轉移 — 單 AI 探索不需要；改用多 AI 時再開
  role-conflict-resolution: false      # 角色決策衝突 — 單 AI 無此情境；多角色協作時再開
  multi-role-tracking: false           # 1 AI 多角色 — 預設單 AI 單角色；若兼任 ≥ 2 角色須改 true
  maintainer-discipline: false         # 位階特殊 — 對採用方無關，僅 framework 維護者啟用
  init-template: true                  # 角色 init 模板 — 仍建議啟用
  ai-vendor-onboarding: false          # v0.6.0 加 — minimal 場景（單 AI 單角色）通常不會邀請新 vendor 或誕生新角色；擴展時請改 true

# === B3 粒度：條款參數（寬鬆）===
parameters:
  audit-rights:
    require_stdout_in_normal_mode: true   # v0.2 後預設
    allow_trust_boundary_disclosure: true  # 寬鬆：允許 stdout 替代
  failure-modes:
    enable_modes: [F1, F2, F3, F6]       # 只啟用最常見的 F1/F2/F3 + F6（v0.7.0 加 — F6 為強制必啟，避免「未驗證即宣告就緒」結構性轉嫁）

# === Domain axioms 槽位（由 mapping.yaml 指向實際檔）===
# 若無領域公理，可指向 minimal 範例：
# domain_axioms:
#   primary: <無，採用框架 evidence-first 預設紀律>
