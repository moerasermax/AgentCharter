# AgentCharter Profile Preset — strict
#
# 適用：嚴格合規 / 多團隊 / 高風險領域（金融、醫療、軍工、生產系統）。
# 設計：全條款啟用 + 最嚴格參數 + 禁用所有寬鬆條款。
#
# 條款啟用：22 / 25（maintainer-discipline 是 maintainer-only / 架構級前提 2 條免設 enabled /
#                       v0.9.0 加 4 條全 true：individual-learning-loop / diagnose-remediate-protocol / adoption-lifecycle / condition-mutability）
# 預設參數：嚴格上限

version: "0.4.0"
charter_version: "0.10.5"
preset: strict

# === B1 粒度：條款啟用 ===
enabled:
  role-separation: true
  audit-rights: true
  failure-modes: true
  structural-anti-fabrication: true
  violation-reflection: true
  escalation-protocol: true
  evidence-first: true
  output-mode-protocol: true
  completion-delivery: true
  handoff-chain: true
  cross-ai-handoff: true
  role-conflict-resolution: true
  multi-role-tracking: true
  domain-axiom-slot: true
  versioning-migration: true
  working-stack-discipline: true
  maintainer-discipline: false       # 位階特殊 — 對採用方無關
  init-template: true
  ai-vendor-onboarding: true         # v0.6.0 加 — 採用方加新 vendor / 新角色時須遵守邀請制四步驟

  # === v0.9.0 加 4 條條款（strict 全 true）===
  individual-learning-loop: true     # v0.9.0 加 — 個體學習迴圈（reflections/ 雙寫紀律 + init step 0 強制讀過去違反）；strict 場景必啟、跨 session 同盲點復發風險不可容忍
  diagnose-remediate-protocol: true  # v0.9.0 加 — spec-as-data + 真實 stdout 證據要求 + commit hook vendor 邀請制；strict 場景每 PASS 必附 binary stdout、純文字視同 F1
  adoption-lifecycle: true           # v0.9.0 加 — 5 階段 lifecycle 全紀律啟用（含棄用 archive 報告 + vendor 升級三路徑強制走授權閘）
  condition-mutability: true         # v0.9.0 加 — 三層 mutability 紀律 + 3-strike 刪除協議；strict 場景 IMMUTABLE-by-AI 比例最高、user 親決所有條款修訂

# === B3 粒度：條款參數（嚴格）===
parameters:
  escalation-protocol:
    enhanced_audit_threshold: 1          # 1 次假宣告即升級至強化抽驗
    structural_failure_threshold: 2      # 連 2 次升級至使用者裁決
  audit-rights:
    require_stdout_in_normal_mode: true
    allow_trust_boundary_disclosure: false  # 嚴格：禁止信任邊界揭示，必須有 stdout 原文
  violation-reflection:
    block_next_task_until_filed: true
    max_followup_replies: 1              # 退稿後僅 1 次補交機會
  output-mode-protocol:
    default_mode: verbose
    auto_upgrade_keywords: ["請詳細", "展開", "為什麼", "完整紀錄"]
  failure-modes:
    enable_modes: [F1, F2, F3, F4, F5, F6]   # v0.7.0 加 F6（之前 v0.5.10 加 F6 但 preset 漏改）

# === Domain axioms 槽位 ===
# strict 預設要求**必含**領域公理檔，不可空白
# 範例（金融）：
# domain_axioms:
#   primary: protocols/IRON.md
#   alias: IRON
